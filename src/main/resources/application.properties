# H2 Database Config
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.datasource.url=jdbc:h2:mem:stadiumdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password

# JPA Config
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update

# SQL Logging (Will print beautifully in IntelliJ terminal for presentation)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Quiet some of the verbose spring logging
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Application Scaling & Deployment Hardening
server.port=${PORT:8080}
server.compression.enabled=true
server.compression.mime-types=text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json
server.compression.min-response-size=1024

# Google Cloud Platform Infrastructure Discovery
spring.cloud.gcp.project-id=physicaleventexperience

# Vertex AI and Cloud Storage Configuration
vertex.ai.project-id=${VERTEX_AI_PROJECT_ID:physicaleventexperience}
vertex.ai.location=${VERTEX_AI_LOCATION:us-central1}
vertex.ai.model-name=${VERTEX_AI_MODEL:gemini-pro}
gcp.storage.enabled=${GCP_STORAGE_ENABLED:false}
gcp.storage.bucket-name=${GCP_STORAGE_BUCKET:stadiumflow-analytics-physicaleventexperience}
stadium.api.key=${STADIUM_API_KEY:placeholder-key}

# Disable GCP auto-configurations for local development (can be overridden by profiles)
spring.cloud.gcp.secretmanager.enabled=false
spring.cloud.gcp.firestore.enabled=false
spring.cloud.gcp.datastore.enabled=false
spring.cloud.gcp.pubsub.enabled=false
